# ============================================================
# SERVER
# ============================================================
server.port=8080

# ============================================================
# DATABASE - MySQL
# ============================================================
spring.datasource.url=jdbc:mysql://localhost:3306/quanlynhatro?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=Tuong@123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================================
# JPA / Hibernate (DB-First: Hibernate chi validate, khong tu tao/sua bang)
# ============================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ============================================================
# SQL INITIALIZATION (DB-First: chay schema.sql va data.sql khi khoi dong)
# ============================================================
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.data-locations=classpath:data.sql
spring.sql.init.continue-on-error=true

# ============================================================
# THYMELEAF
# ============================================================
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# ============================================================
# FILE UPLOAD
# ============================================================
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# ============================================================
# LOGGING
# ============================================================
logging.level.org.springframework.security=DEBUG
logging.level.com.nhatro=DEBUG
