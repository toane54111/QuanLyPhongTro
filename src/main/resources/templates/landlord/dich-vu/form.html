<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><title>Dịch vụ</title></head>
<body>
<div th:replace="~{layout/main :: layout(title=${isEdit ? 'Sửa dịch vụ' : 'Thêm dịch vụ'}, content=~{::mainContent})}">
    <div th:fragment="mainContent">

        <!-- Flash messages -->
        <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
            <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
            <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- Page Header -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>
                <i class="bi bi-gear me-2"></i>
                <span th:if="${isEdit}">Sửa dịch vụ</span>
                <span th:unless="${isEdit}">Thêm dịch vụ</span>
            </h2>
        </div>

        <!-- Form -->
        <div class="card">
            <div class="card-body">
                <form th:action="${isEdit ? '/landlord/dich-vu/edit/' + dichVu.dichVuId : '/landlord/dich-vu/create'}"
                      method="post" th:object="${dichVu}">

                    <div class="mb-3">
                        <label for="tenDV" class="form-label">Tên dịch vụ <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="tenDV" th:field="*{tenDV}"
                               placeholder="Nhập tên dịch vụ" required>
                    </div>

                    <div class="mb-3">
                        <label for="donGia" class="form-label">Đơn giá (VND) <span class="text-danger">*</span></label>
                        <input type="number" class="form-control" id="donGia" th:field="*{donGia}"
                               placeholder="Nhập đơn giá" step="0.01" min="0" required>
                    </div>

                    <div class="mb-3">
                        <label for="donViTinh" class="form-label">Đơn vị tính <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="donViTinh" th:field="*{donViTinh}"
                               placeholder="VD: kWh, m³, tháng" required>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-check-circle me-1"></i>
                            <span th:if="${isEdit}">Cập nhật</span>
                            <span th:unless="${isEdit}">Thêm mới</span>
                        </button>
                        <a th:href="@{/landlord/dich-vu}" class="btn btn-secondary">
                            <i class="bi bi-arrow-left me-1"></i>Hủy
                        </a>
                    </div>
                </form>
            </div>
        </div>

    </div>
</div>
</body>
</html>
