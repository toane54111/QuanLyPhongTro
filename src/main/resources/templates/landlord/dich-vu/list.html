<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><title>Quản lý Dịch vụ</title></head>
<body>
<div th:replace="~{layout/main :: layout(title='Quản lý Dịch vụ & Đơn giá', content=~{::mainContent})}">
    <div th:fragment="mainContent">

        <!-- Flash messages -->
        <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
            <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
            <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- Page Header -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="bi bi-gear me-2"></i>Quản lý Dịch vụ &amp; Đơn giá</h2>
            <a th:href="@{/landlord/dich-vu/create}" class="btn btn-primary">
                <i class="bi bi-plus-circle me-1"></i>Thêm dịch vụ
            </a>
        </div>

        <!-- Table -->
        <div class="card">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover align-middle" th:if="${!danhSachDichVu.isEmpty()}">
                        <thead class="table-light">
                        <tr>
                            <th>#</th>
                            <th>Tên dịch vụ</th>
                            <th>Đơn giá</th>
                            <th>Đơn vị tính</th>
                            <th>Thao tác</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="dv, iter : ${danhSachDichVu}">
                            <td th:text="${iter.count}"></td>
                            <td th:text="${dv.tenDV}"></td>
                            <td th:text="${#numbers.formatDecimal(dv.donGia, 0, 'COMMA', 0, 'POINT')} + ' VND'"></td>
                            <td th:text="${dv.donViTinh}"></td>
                            <td>
                                <a th:href="@{/landlord/dich-vu/edit/{id}(id=${dv.dichVuId})}"
                                   class="btn btn-sm btn-outline-warning me-1">
                                    <i class="bi bi-pencil-square"></i> Sửa
                                </a>
                                <form th:action="@{/landlord/dich-vu/delete/{id}(id=${dv.dichVuId})}"
                                      method="post" class="d-inline"
                                      onsubmit="return confirm('Bạn có chắc chắn muốn xóa dịch vụ này?');">
                                    <button type="submit" class="btn btn-sm btn-outline-danger">
                                        <i class="bi bi-trash"></i> Xóa
                                    </button>
                                </form>
                            </td>
                        </tr>
                        </tbody>
                    </table>

                    <!-- Empty state -->
                    <div th:if="${danhSachDichVu.isEmpty()}" class="text-center py-5">
                        <i class="bi bi-gear text-muted" style="font-size: 3rem;"></i>
                        <p class="text-muted mt-3">Chưa có dịch vụ nào. Hãy thêm dịch vụ mới!</p>
                        <a th:href="@{/landlord/dich-vu/create}" class="btn btn-primary">
                            <i class="bi bi-plus-circle me-1"></i>Thêm dịch vụ
                        </a>
                    </div>
                </div>
            </div>
        </div>

    </div>
</div>
</body>
</html>
