<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><title>Lập hóa đơn hàng loạt</title></head>
<body>
<div th:replace="~{layout/main :: layout(title='Lập hóa đơn hàng loạt', content=~{::mainContent})}">
    <div th:fragment="mainContent">

        <!-- Page Header -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="bi bi-receipt-cutoff me-2"></i>Lập hóa đơn hàng loạt</h2>
            <a th:href="@{/landlord/hoa-don}" class="btn btn-outline-secondary">
                <i class="bi bi-arrow-left me-1"></i>Quay lại
            </a>
        </div>

        <div class="card">
            <div class="card-header">
                <h5 class="mb-0">Bước 1: Chọn kỳ thanh toán</h5>
            </div>
            <div class="card-body">
                <form th:action="@{/landlord/hoa-don/batch/preview}" method="post">
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">Kỳ thanh toán <span class="text-danger">*</span></label>
                            <input type="month" class="form-control" name="kyThanhToan" th:max="${currentMonth}" required>
                            <small class="form-text text-muted">Chọn tháng/năm cần lập hóa đơn</small>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Hạn thanh toán</label>
                            <input type="date" class="form-control" name="hanThanhToan">
                            <small class="form-text text-muted">Mặc định: 15 ngày kể từ hôm nay</small>
                        </div>
                    </div>

                    <div class="alert alert-info">
                        <i class="bi bi-info-circle me-1"></i>
                        Hệ thống sẽ tự động tính tiền phòng, tiền điện, tiền nước và phí dịch vụ
                        cho <strong>tất cả phòng đang thuê</strong> trong kỳ này.
                        Bạn sẽ xem trước bảng hóa đơn dự kiến trước khi xác nhận tạo.
                    </div>

                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-eye me-1"></i>Xem trước hóa đơn
                    </button>
                </form>
            </div>
        </div>

    </div>
</div>
</body>
</html>
