<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><title>Lập hóa đơn</title></head>
<body>
<div th:replace="~{layout/main :: layout(title='Lập hóa đơn', content=~{::mainContent})}">
    <div th:fragment="mainContent">

        <!-- Flash messages -->
        <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
            <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
            <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- Page Header -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="bi bi-receipt-cutoff me-2"></i>Lập hóa đơn</h2>
        </div>

        <!-- Form -->
        <div class="card">
            <div class="card-body">
                <form th:action="@{/landlord/hoa-don/create}" method="post" th:object="${hoaDon}">

                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">Hợp đồng <span class="text-danger">*</span></label>
                            <select name="hopDongId" class="form-select" required>
                                <option value="">-- Chọn hợp đồng --</option>
                                <option th:each="hd : ${danhSachHopDong}"
                                        th:value="${hd.hopDongId}"
                                        th:text="'Phòng ' + ${hd.phongTro.soPhong} + ' - ' + ${hd.khachThue.hoTen}">
                                </option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Kỳ thanh toán <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" name="kyThanhToan"
                                   placeholder="YYYY-MM" required>
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">Hạn thanh toán</label>
                            <input type="date" class="form-control" th:field="*{hanThanhToan}">
                        </div>
                    </div>

                    <div class="alert alert-info">
                        <i class="bi bi-info-circle me-1"></i>
                        Tiền phòng, tiền điện, tiền nước sẽ được tính tự động dựa trên hợp đồng và chỉ số điện nước.
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-check-circle me-1"></i>Lập hóa đơn
                        </button>
                        <a th:href="@{/landlord/hoa-don}" class="btn btn-secondary">
                            <i class="bi bi-x-circle me-1"></i>Hủy
                        </a>
                    </div>
                </form>
            </div>
        </div>

    </div>
</div>
</body>
</html>
