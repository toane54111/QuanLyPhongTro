<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><title>Gia hạn Hợp đồng</title></head>
<body>
<div th:replace="~{layout/main :: layout(title='Gia hạn Hợp đồng', content=~{::mainContent})}">
    <div th:fragment="mainContent">

        <!-- Flash messages -->
        <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
            <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
            <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- Page Header -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>
                <i class="bi bi-calendar-plus me-2"></i>Gia hạn Hợp đồng
                <span class="text-primary" th:text="'#' + ${hopDong.hopDongId}"></span>
            </h2>
        </div>

        <!-- Current Contract Info -->
        <div class="card mb-4">
            <div class="card-header bg-light">
                <h5 class="mb-0"><i class="bi bi-info-circle me-2"></i>Thông tin hợp đồng hiện tại</h5>
            </div>
            <div class="card-body">
                <div class="row">
                    <div class="col-md-4">
                        <p class="mb-1 text-muted">Phòng</p>
                        <p class="fw-bold">
                            <span th:text="${hopDong.phongTro.soPhong}"></span>
                            <span class="text-muted"> - </span>
                            <span th:text="${hopDong.phongTro.khuTro.tenKhu}"></span>
                        </p>
                    </div>
                    <div class="col-md-4">
                        <p class="mb-1 text-muted">Khách thuê</p>
                        <p class="fw-bold" th:text="${hopDong.khachThue.hoTen}"></p>
                    </div>
                    <div class="col-md-4">
                        <p class="mb-1 text-muted">Ngày kết thúc hiện tại</p>
                        <p class="fw-bold" th:text="${#temporals.format(hopDong.ngayKetThuc, 'dd/MM/yyyy')}"></p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Extend Form -->
        <div class="card">
            <div class="card-header bg-light">
                <h5 class="mb-0"><i class="bi bi-calendar-range me-2"></i>Thông tin gia hạn</h5>
            </div>
            <div class="card-body">
                <form th:action="@{/landlord/hop-dong/extend/{id}(id=${hopDong.hopDongId})}" method="post">
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">Số tháng gia hạn <span class="text-danger">*</span></label>
                            <input type="number" class="form-control" name="soThangGiaHan"
                                   min="1" max="24" required placeholder="Nhập số tháng">
                            <div class="form-text">Tối thiểu 1 tháng, tối đa 24 tháng.</div>
                        </div>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-success">
                            <i class="bi bi-check-circle me-1"></i>Gia hạn
                        </button>
                        <a th:href="@{/landlord/hop-dong}" class="btn btn-secondary">
                            <i class="bi bi-x-circle me-1"></i>Hủy
                        </a>
                    </div>
                </form>
            </div>
        </div>

    </div>
</div>
</body>
</html>
