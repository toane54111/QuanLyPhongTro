<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><title>Khách thuê</title></head>
<body>
<div th:replace="~{layout/main :: layout(title=${isEdit ? 'Sửa khách thuê' : 'Thêm khách thuê'}, content=~{::mainContent})}">
    <div th:fragment="mainContent">

        <!-- Flash messages -->
        <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
            <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
            <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- Page Header -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>
                <i class="bi bi-people me-2"></i>
                <span th:if="${isEdit}">Sửa khách thuê</span>
                <span th:unless="${isEdit}">Thêm khách thuê</span>
            </h2>
        </div>

        <!-- Form -->
        <div class="card">
            <div class="card-body">
                <form th:action="${isEdit ? '/landlord/khach-thue/edit/' + khachThue.userId : '/landlord/khach-thue/create'}"
                      method="post" th:object="${khachThue}">

                    <div class="mb-3">
                        <label for="hoTen" class="form-label">Họ tên <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="hoTen" th:field="*{hoTen}"
                               placeholder="Nhập họ tên" required>
                    </div>

                    <div class="mb-3">
                        <label for="email" class="form-label">Email <span class="text-danger">*</span></label>
                        <input type="email" class="form-control" id="email" th:field="*{email}"
                               placeholder="Nhập email" required
                               th:disabled="${isEdit}">
                    </div>

                    <div class="mb-3">
                        <label for="sdt" class="form-label">Số điện thoại</label>
                        <input type="text" class="form-control" id="sdt" th:field="*{sdt}"
                               placeholder="Nhập số điện thoại">
                    </div>

                    <div class="mb-3">
                        <label for="cccd" class="form-label">CCCD</label>
                        <input type="text" class="form-control" id="cccd" th:field="*{cccd}"
                               placeholder="Nhập số CCCD"
                               th:disabled="${isEdit}">
                    </div>

                    <div class="alert alert-info" th:unless="${isEdit}">
                        <i class="bi bi-info-circle me-1"></i>Mật khẩu mặc định: <strong>123456</strong>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-check-circle me-1"></i>
                            <span th:if="${isEdit}">Cập nhật</span>
                            <span th:unless="${isEdit}">Thêm mới</span>
                        </button>
                        <a th:href="@{/landlord/khach-thue}" class="btn btn-secondary">
                            <i class="bi bi-arrow-left me-1"></i>Hủy
                        </a>
                    </div>
                </form>
            </div>
        </div>

    </div>
</div>
</body>
</html>
