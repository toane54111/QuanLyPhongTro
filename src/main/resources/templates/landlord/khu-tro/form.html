<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><title>Khu trọ</title></head>
<body>
<div th:replace="~{layout/main :: layout(title=${isEdit ? 'Sửa khu trọ' : 'Thêm khu trọ'}, content=~{::mainContent})}">
    <div th:fragment="mainContent">

        <!-- Flash messages -->
        <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
            <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
            <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- Page Header -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>
                <i class="bi bi-building me-2"></i>
                <span th:if="${isEdit}">Sửa khu trọ</span>
                <span th:unless="${isEdit}">Thêm khu trọ</span>
            </h2>
        </div>

        <!-- Form -->
        <div class="card">
            <div class="card-body">
                <form th:action="${isEdit ? '/landlord/khu-tro/edit/' + khuTro.khuTroId : '/landlord/khu-tro/create'}"
                      method="post" th:object="${khuTro}">

                    <div class="mb-3">
                        <label for="tenKhu" class="form-label">Tên khu <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="tenKhu" th:field="*{tenKhu}"
                               placeholder="Nhập tên khu trọ" required>
                    </div>

                    <div class="mb-3">
                        <label for="diaChi" class="form-label">Địa chỉ <span class="text-danger">*</span></label>
                        <textarea class="form-control" id="diaChi" th:field="*{diaChi}" rows="2"
                                  placeholder="Nhập địa chỉ" required></textarea>
                    </div>

                    <div class="mb-3">
                        <label for="soTang" class="form-label">Số tầng</label>
                        <input type="number" class="form-control" id="soTang" th:field="*{soTang}"
                               placeholder="Nhập số tầng" min="1">
                    </div>

                    <div class="mb-3">
                        <label for="moTa" class="form-label">Mô tả</label>
                        <textarea class="form-control" id="moTa" th:field="*{moTa}" rows="3"
                                  placeholder="Nhập mô tả (tùy chọn)"></textarea>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-check-circle me-1"></i>
                            <span th:if="${isEdit}">Cập nhật</span>
                            <span th:unless="${isEdit}">Thêm mới</span>
                        </button>
                        <a th:href="@{/landlord/khu-tro}" class="btn btn-secondary">
                            <i class="bi bi-arrow-left me-1"></i>Hủy
                        </a>
                    </div>
                </form>
            </div>
        </div>

    </div>
</div>
</body>
</html>
