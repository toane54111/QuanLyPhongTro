<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><title>Quản lý Khu trọ</title></head>
<body>
<div th:replace="~{layout/main :: layout(title='Quản lý Khu trọ', content=~{::mainContent})}">
    <div th:fragment="mainContent">

        <!-- Flash messages -->
        <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
            <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
            <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- Page Header -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="bi bi-building me-2"></i>Quản lý Khu trọ</h2>
            <a th:href="@{/landlord/khu-tro/create}" class="btn btn-primary">
                <i class="bi bi-plus-circle me-1"></i>Thêm khu trọ
            </a>
        </div>

        <!-- Table -->
        <div class="card">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover align-middle" th:if="${!danhSachKhuTro.isEmpty()}">
                        <thead class="table-light">
                        <tr>
                            <th>#</th>
                            <th>Tên khu</th>
                            <th>Địa chỉ</th>
                            <th>Số tầng</th>
                            <th>Số phòng</th>
                            <th>Thao tác</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="khu, iter : ${danhSachKhuTro}">
                            <td th:text="${iter.count}"></td>
                            <td th:text="${khu.tenKhu}"></td>
                            <td th:text="${khu.diaChi}"></td>
                            <td th:text="${khu.soTang}"></td>
                            <td th:text="${khu.phongTros.size()}"></td>
                            <td>
                                <a th:href="@{/landlord/khu-tro/edit/{id}(id=${khu.khuTroId})}"
                                   class="btn btn-sm btn-outline-warning me-1">
                                    <i class="bi bi-pencil-square"></i> Sửa
                                </a>
                                <form th:action="@{/landlord/khu-tro/delete/{id}(id=${khu.khuTroId})}"
                                      method="post" class="d-inline"
                                      onsubmit="return confirm('Bạn có chắc chắn muốn xóa khu trọ này?');">
                                    <button type="submit" class="btn btn-sm btn-outline-danger">
                                        <i class="bi bi-trash"></i> Xóa
                                    </button>
                                </form>
                            </td>
                        </tr>
                        </tbody>
                    </table>

                    <!-- Empty state -->
                    <div th:if="${danhSachKhuTro.isEmpty()}" class="text-center py-5">
                        <i class="bi bi-building text-muted" style="font-size: 3rem;"></i>
                        <p class="text-muted mt-3">Chưa có khu trọ nào. Hãy thêm khu trọ mới!</p>
                        <a th:href="@{/landlord/khu-tro/create}" class="btn btn-primary">
                            <i class="bi bi-plus-circle me-1"></i>Thêm khu trọ
                        </a>
                    </div>
                </div>
            </div>
        </div>

    </div>
</div>
</body>
</html>
