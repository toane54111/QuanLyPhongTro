<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><title>Quản lý Phòng trọ</title></head>
<body>
<div th:replace="~{layout/main :: layout(title='Quản lý Phòng trọ', content=~{::mainContent})}">
    <div th:fragment="mainContent">

        <!-- Flash messages -->
        <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
            <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
            <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- Page Header -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="bi bi-door-open me-2"></i>Sơ đồ Phòng</h2>
            <a th:href="@{/landlord/phong-tro/create}" class="btn btn-dark fw-medium px-3 rounded-3" style="background-color: #1a233a;">
                <i class="bi bi-plus-lg me-1"></i>Thêm phòng mới
            </a>
        </div>

        <!-- Filter Bar -->
        <div class="card mb-4">
            <div class="card-body">
                <form th:action="@{/landlord/phong-tro}" method="get" class="row g-3 align-items-end">
                    <div class="col-md-4">
                        <label for="khuTroId" class="form-label">Khu trọ</label>
                        <select name="khuTroId" id="khuTroId" class="form-select">
                            <option value="">-- Tất cả khu trọ --</option>
                            <option th:each="khu : ${danhSachKhuTro}"
                                    th:value="${khu.khuTroId}"
                                    th:text="${khu.tenKhu}"
                                    th:selected="${selectedKhuTroId != null && selectedKhuTroId == khu.khuTroId}">
                            </option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label for="trangThai" class="form-label">Trạng thái</label>
                        <select name="trangThai" id="trangThai" class="form-select">
                            <option value="">-- Tất cả trạng thái --</option>
                            <option th:each="tt : ${trangThaiPhongs}"
                                    th:value="${tt}"
                                    th:text="${tt.name() == 'TRONG' ? 'Trống' : (tt.name() == 'DA_THUE' ? 'Đã thuê' : 'Bảo trì')}"
                                    th:selected="${selectedTrangThai != null && selectedTrangThai.name() == tt.name()}">
                            </option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <button type="submit" class="btn btn-dark px-4 rounded-3" style="background-color: #1a233a;">
                            <i class="bi bi-funnel me-2"></i>Lọc
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Table -->
        <div class="card">
            <div class="card-body">
                <div class="table-responsive">
                    <!-- Biểu diễn từng tầng -->
                    <div th:each="entry : ${phongTroByTang}" class="mb-5">
                        <div class="d-flex align-items-center mb-4">
                            <h6 class="text-secondary fw-bold mb-0 me-3" style="letter-spacing: 1px;" th:text="'TẦNG ' + ${entry.key}">TẦNG 1</h6>
                            <hr class="flex-grow-1 m-0 text-muted opacity-25">
                        </div>
                        <div class="row g-3">
                            <div class="col-12 col-sm-6 col-lg-4 col-xl-3" th:each="phong : ${entry.value}">
                                <div class="card h-100 position-relative" 
                                     th:style="${phong.trangThai.name() == 'TRONG' ? 'border: 1px solid #e0e0e0; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.02);' : (phong.trangThai.name() == 'DA_THUE' ? 'border: 1px solid #ffccd5; border-left: 4px solid #ff4d4f; border-radius: 8px; box-shadow: 0 4px 12px rgba(255, 77, 79, 0.08);' : 'border: 1px solid #ffeeba; border-left: 4px solid #ffc107; border-radius: 8px;')}">
                                    <div class="card-body d-flex flex-column p-4">
                                        <!-- Header: Room Number and Dropdown -->
                                        <div class="d-flex justify-content-between align-items-start mb-2">
                                            <h3 class="mb-0 fw-bolder text-dark" th:text="${phong.soPhong}" style="font-size: 1.5rem;">101</h3>
                                            <div class="dropdown">
                                                <button class="btn btn-sm btn-link text-muted p-0" type="button" data-bs-toggle="dropdown" aria-expanded="false">
                                                    <i class="bi bi-three-dots-vertical fs-5"></i>
                                                </button>
                                                <ul class="dropdown-menu dropdown-menu-end shadow-sm">
                                                    <li><a class="dropdown-item" th:href="@{/landlord/phong-tro/{id}(id=${phong.phongId})}"><i class="bi bi-eye text-primary me-2"></i>Chi tiết</a></li>
                                                    <li><a class="dropdown-item" th:href="@{/landlord/phong-tro/edit/{id}(id=${phong.phongId})}"><i class="bi bi-pencil-square text-warning me-2"></i>Sửa</a></li>
                                                    <li><hr class="dropdown-divider"></li>
                                                    <li>
                                                        <form th:action="@{/landlord/phong-tro/delete/{id}(id=${phong.phongId})}" method="post" onsubmit="return confirm('Bạn có chắc chắn muốn xóa phòng này?');">
                                                            <button type="submit" class="dropdown-item text-danger"><i class="bi bi-trash me-2"></i>Xóa</button>
                                                        </form>
                                                    </li>
                                                </ul>
                                            </div>
                                        </div>
                                        
                                        <!-- Khách thuê info / Icon -->
                                        <div class="mb-4 flex-grow-1">
                                            <!-- Nếu đang thuê -->
                                            <th:block th:if="${phong.trangThai.name() == 'DA_THUE'}">
                                                <small class="d-block text-uppercase text-secondary fw-semibold mb-1" style="font-size: 0.7rem; letter-spacing: 0.5px;">Khách thuê</small>
                                                <h5 class="fw-bold text-dark text-truncate mb-0" 
                                                    style="font-size: 1.1rem;"
                                                    th:if="${phong.getHopDongHienTai() != null}" 
                                                    th:text="${phong.getHopDongHienTai().khachThue.hoTen}">Nguyễn Văn An</h5>
                                            </th:block>
                                            
                                            <!-- Nếu trống hoặc bảo trì -->
                                            <div th:if="${phong.trangThai.name() == 'TRONG' || phong.trangThai.name() == 'BAO_TRI'}" class="text-center mt-3 mb-2">
                                                <i class="bi bi-door-open" style="font-size: 3.5rem; color: #a8e6cf;" th:if="${phong.trangThai.name() == 'TRONG'}"></i>
                                                <i class="bi bi-tools" style="font-size: 3.5rem; color: #ffd166;" th:if="${phong.trangThai.name() == 'BAO_TRI'}"></i>
                                            </div>
                                        </div>

                                        <!-- Footer: Meta info -->
                                        <div class="d-flex justify-content-between align-items-end mt-auto pt-2">
                                            <div style="font-size: 0.8rem; line-height: 1.4;">
                                                <!-- Đang thuê -> Hiện HĐ -->
                                                <div th:if="${phong.trangThai.name() == 'DA_THUE'}">
                                                    <span class="text-secondary">HĐ:</span> <br>
                                                    <span class="fw-medium text-dark" th:if="${phong.getHopDongHienTai() != null}" th:text="${#temporals.format(phong.getHopDongHienTai().ngayKetThuc, 'MM/yyyy')}">12/2024</span>
                                                </div>
                                                <!-- Trống -> Hiện diện tích -->
                                                <div th:if="${phong.trangThai.name() != 'DA_THUE'}">
                                                    <span class="text-secondary"><span th:text="${phong.dienTich}">25</span>m² •</span> <br>
                                                    <span class="text-secondary" th:text="${phong.trangThai.name() == 'TRONG' ? 'Trống' : 'Bảo trì'}">Trống</span>
                                                </div>
                                            </div>
                                            <div>
                                                <a th:href="@{/landlord/phong-tro/{id}(id=${phong.phongId})}" class="text-decoration-none">
                                                    <span class="badge px-3 py-2 fw-bold"
                                                        th:style="${phong.trangThai.name() == 'TRONG' ? 'background-color: #e6f4ea; color: #1e8e3e; border-radius: 6px;' : (phong.trangThai.name() == 'DA_THUE' ? 'background-color: #fce8e6; color: #d93025; border-radius: 6px;' : 'background-color: #fef0ca; color: #b06000; border-radius: 6px;')}"
                                                        th:text="${phong.trangThai.name() == 'TRONG' ? 'TRỐNG' : (phong.trangThai.name() == 'DA_THUE' ? 'ĐANG THUÊ' : 'BẢO TRÌ')}">
                                                    </span>
                                                </a>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Empty state -->
                    <div th:if="${danhSachPhongTro.isEmpty()}" class="text-center py-5">
                        <i class="bi bi-door-open text-muted" style="font-size: 3rem;"></i>
                        <p class="text-muted mt-3">Chưa có phòng trọ nào. Hãy thêm phòng mới!</p>
                        <a th:href="@{/landlord/phong-tro/create}" class="btn btn-dark fw-medium px-3 rounded-3" style="background-color: #1a233a;">
                            <i class="bi bi-plus-lg me-1"></i>Thêm phòng mới
                        </a>
                    </div>
                </div>
            </div>
        </div>

    </div>
</div>
</body>
</html>
