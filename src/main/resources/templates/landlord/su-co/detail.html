<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><title>Chi tiết Sự cố</title></head>
<body>
<div th:replace="~{layout/main :: layout(title='Chi tiết Sự cố', content=~{::mainContent})}">
    <div th:fragment="mainContent">

        <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
            <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
            <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- Page Header -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="bi bi-exclamation-triangle me-2"></i>Chi tiết Sự cố #<span th:text="${yeuCauSuCo.ticketId}"></span></h2>
            <a th:href="@{/landlord/su-co}" class="btn btn-outline-secondary">
                <i class="bi bi-arrow-left me-1"></i>Quay lại
            </a>
        </div>

        <div class="row g-4">
            <!-- Thông tin sự cố -->
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <h5 class="mb-0"><i class="bi bi-info-circle me-2"></i>Thông tin sự cố</h5>
                    </div>
                    <div class="card-body">
                        <table class="table table-borderless mb-0">
                            <tr>
                                <th class="text-muted" style="width: 40%;">Phòng</th>
                                <td th:text="${yeuCauSuCo.phongTro.soPhong}"></td>
                            </tr>
                            <tr>
                                <th class="text-muted">Khách thuê</th>
                                <td th:text="${yeuCauSuCo.khachThue.hoTen}"></td>
                            </tr>
                            <tr>
                                <th class="text-muted">Loại sự cố</th>
                                <td th:text="${yeuCauSuCo.loaiSuCo}"></td>
                            </tr>
                            <tr>
                                <th class="text-muted">Mô tả</th>
                                <td th:text="${yeuCauSuCo.moTa}"></td>
                            </tr>
                            <tr>
                                <th class="text-muted">Mức độ ưu tiên</th>
                                <td>
                                    <span class="badge"
                                          th:classappend="${yeuCauSuCo.mucDoUuTien.name() == 'THAP' ? 'bg-success' :
                                              (yeuCauSuCo.mucDoUuTien.name() == 'TRUNG_BINH' ? 'bg-warning' : 'bg-danger')}"
                                          th:text="${yeuCauSuCo.mucDoUuTien.name() == 'THAP' ? 'Thấp' :
                                              (yeuCauSuCo.mucDoUuTien.name() == 'TRUNG_BINH' ? 'Trung bình' : 'Cao')}">
                                    </span>
                                </td>
                            </tr>
                            <tr>
                                <th class="text-muted">Trạng thái</th>
                                <td>
                                    <span class="badge"
                                          th:classappend="${yeuCauSuCo.trangThai.name() == 'MOI' ? 'bg-primary' :
                                              (yeuCauSuCo.trangThai.name() == 'DA_TIEP_NHAN' ? 'bg-info' :
                                              (yeuCauSuCo.trangThai.name() == 'DANG_SUA' ? 'bg-warning' : 'bg-success'))}"
                                          th:text="${yeuCauSuCo.trangThai.name() == 'MOI' ? 'Mới' :
                                              (yeuCauSuCo.trangThai.name() == 'DA_TIEP_NHAN' ? 'Đã tiếp nhận' :
                                              (yeuCauSuCo.trangThai.name() == 'DANG_SUA' ? 'Đang sửa' : 'Đã xong'))}">
                                    </span>
                                </td>
                            </tr>
                            <tr>
                                <th class="text-muted">Ngày tạo</th>
                                <td th:text="${#temporals.format(yeuCauSuCo.ngayTao, 'dd/MM/yyyy HH:mm')}"></td>
                            </tr>
                            <tr>
                                <th class="text-muted">Ghi chú xử lý</th>
                                <td th:text="${yeuCauSuCo.ghiChuXuLy != null ? yeuCauSuCo.ghiChuXuLy : 'Chưa có'}"></td>
                            </tr>
                        </table>
                    </div>
                </div>
            </div>

            <!-- Form cập nhật trạng thái -->
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <h5 class="mb-0"><i class="bi bi-pencil-square me-2"></i>Cập nhật trạng thái</h5>
                    </div>
                    <div class="card-body">
                        <form th:action="@{/landlord/su-co/update-status/{id}(id=${yeuCauSuCo.ticketId})}" method="post">
                            <div class="mb-3">
                                <label for="trangThai" class="form-label">Trạng thái <span class="text-danger">*</span></label>
                                <select class="form-select" id="trangThai" name="trangThai" required>
                                    <option th:each="tt : ${trangThaiSuCos}"
                                            th:value="${tt}"
                                            th:selected="${yeuCauSuCo.trangThai == tt}"
                                            th:text="${tt.name() == 'MOI' ? 'Mới' :
                                                (tt.name() == 'DA_TIEP_NHAN' ? 'Đã tiếp nhận' :
                                                (tt.name() == 'DANG_SUA' ? 'Đang sửa' : 'Đã xong'))}">
                                    </option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label for="ghiChuXuLy" class="form-label">Ghi chú xử lý</label>
                                <textarea class="form-control" id="ghiChuXuLy" name="ghiChuXuLy"
                                          rows="4" placeholder="Nhập ghi chú xử lý..."
                                          th:text="${yeuCauSuCo.ghiChuXuLy}"></textarea>
                            </div>
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-check-circle me-1"></i>Cập nhật
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>

    </div>
</div>
</body>
</html>
