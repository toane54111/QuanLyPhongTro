<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><title>Thống kê doanh thu</title></head>
<body>
<div th:replace="~{layout/main :: layout(title='Thống kê doanh thu', content=~{::mainContent})}">
    <div th:fragment="mainContent">

        <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
            <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
            <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- Page Header -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="bi bi-bar-chart-line me-2"></i>Thống kê doanh thu</h2>
        </div>

        <!-- Stat Cards -->
        <div class="row g-3 mb-4">
            <div class="col-md-3">
                <div class="card stat-card">
                    <div class="card-body d-flex align-items-center">
                        <div class="stat-icon bg-primary bg-opacity-10 text-primary me-3">
                            <i class="bi bi-door-open"></i>
                        </div>
                        <div>
                            <div class="stat-value" th:text="${thongKeTongQuan['tongPhong']}">0</div>
                            <div class="stat-label">Tổng phòng</div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card stat-card">
                    <div class="card-body d-flex align-items-center">
                        <div class="stat-icon bg-success bg-opacity-10 text-success me-3">
                            <i class="bi bi-house-check"></i>
                        </div>
                        <div>
                            <div class="stat-value" th:text="${thongKeTongQuan['phongDaThue']}">0</div>
                            <div class="stat-label">Phòng đã thuê</div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card stat-card">
                    <div class="card-body d-flex align-items-center">
                        <div class="stat-icon bg-warning bg-opacity-10 text-warning me-3">
                            <i class="bi bi-check-circle"></i>
                        </div>
                        <div>
                            <div class="stat-value" th:text="${thongKeTongQuan['phongTrong']}">0</div>
                            <div class="stat-label">Phòng trống</div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card stat-card">
                    <div class="card-body d-flex align-items-center">
                        <div class="stat-icon bg-danger bg-opacity-10 text-danger me-3">
                            <i class="bi bi-tools"></i>
                        </div>
                        <div>
                            <div class="stat-value" th:text="${thongKeTongQuan['phongBaoTri']}">0</div>
                            <div class="stat-label">Phòng bảo trì</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row g-3 mb-4">
            <div class="col-md-4">
                <div class="card stat-card">
                    <div class="card-body d-flex align-items-center">
                        <div class="stat-icon bg-info bg-opacity-10 text-info me-3">
                            <i class="bi bi-file-earmark-text"></i>
                        </div>
                        <div>
                            <div class="stat-value" th:text="${thongKeTongQuan['hopDongHieuLuc']}">0</div>
                            <div class="stat-label">Hợp đồng hiệu lực</div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card stat-card">
                    <div class="card-body d-flex align-items-center">
                        <div class="stat-icon bg-danger bg-opacity-10 text-danger me-3">
                            <i class="bi bi-receipt"></i>
                        </div>
                        <div>
                            <div class="stat-value" th:text="${thongKeTongQuan['hoaDonChuaThanhToan']}">0</div>
                            <div class="stat-label">Hóa đơn chưa TT</div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card stat-card">
                    <div class="card-body d-flex align-items-center">
                        <div class="stat-icon bg-primary bg-opacity-10 text-primary me-3">
                            <i class="bi bi-pie-chart"></i>
                        </div>
                        <div>
                            <div class="stat-value" th:text="${thongKeTongQuan['tyLeLapDay']} + '%'">0%</div>
                            <div class="stat-label">Tỷ lệ lấp đầy</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Chart Section -->
        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <h5 class="mb-0"><i class="bi bi-graph-up me-2"></i>Biểu đồ doanh thu theo tháng</h5>
                <div class="d-flex align-items-center gap-2">
                    <label for="namChon" class="form-label mb-0">Năm:</label>
                    <input type="number" class="form-control form-control-sm" id="namChon"
                           th:value="${namHienTai}" style="width: 100px;" min="2020" max="2099">
                    <button class="btn btn-sm btn-primary" id="btnLoadChart">
                        <i class="bi bi-arrow-clockwise me-1"></i>Tải lại
                    </button>
                </div>
            </div>
            <div class="card-body">
                <canvas id="doanhThuChart" height="100"></canvas>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
        <script th:inline="javascript">
            (function() {
                const namHienTai = /*[[${namHienTai}]]*/ 2024;
                let doanhThuChart = null;

                function loadChart(nam) {
                    fetch('/landlord/thong-ke/api/doanh-thu?nam=' + nam)
                        .then(response => response.json())
                        .then(data => {
                            const labels = ['Tháng 1', 'Tháng 2', 'Tháng 3', 'Tháng 4', 'Tháng 5', 'Tháng 6',
                                'Tháng 7', 'Tháng 8', 'Tháng 9', 'Tháng 10', 'Tháng 11', 'Tháng 12'];

                            const doanhThuData = [];
                            for (let i = 1; i <= 12; i++) {
                                doanhThuData.push(data[i] || 0);
                            }

                            if (doanhThuChart) {
                                doanhThuChart.destroy();
                            }

                            const ctx = document.getElementById('doanhThuChart').getContext('2d');
                            doanhThuChart = new Chart(ctx, {
                                type: 'bar',
                                data: {
                                    labels: labels,
                                    datasets: [{
                                        label: 'Doanh thu (VND)',
                                        data: doanhThuData,
                                        backgroundColor: 'rgba(54, 162, 235, 0.6)',
                                        borderColor: 'rgba(54, 162, 235, 1)',
                                        borderWidth: 1,
                                        borderRadius: 4
                                    }]
                                },
                                options: {
                                    responsive: true,
                                    plugins: {
                                        legend: { display: true, position: 'top' },
                                        tooltip: {
                                            callbacks: {
                                                label: function(context) {
                                                    return context.dataset.label + ': ' +
                                                        new Intl.NumberFormat('vi-VN').format(context.raw) + ' VND';
                                                }
                                            }
                                        }
                                    },
                                    scales: {
                                        y: {
                                            beginAtZero: true,
                                            ticks: {
                                                callback: function(value) {
                                                    return new Intl.NumberFormat('vi-VN').format(value);
                                                }
                                            }
                                        }
                                    }
                                }
                            });
                        })
                        .catch(error => {
                            console.error('Lỗi khi tải dữ liệu doanh thu:', error);
                        });
                }

                // Load chart on page load
                loadChart(namHienTai);

                // Reload on button click
                document.getElementById('btnLoadChart').addEventListener('click', function() {
                    const nam = document.getElementById('namChon').value;
                    loadChart(nam);
                });

                // Reload on Enter key in year input
                document.getElementById('namChon').addEventListener('keypress', function(e) {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        loadChart(this.value);
                    }
                });
            })();
        </script>

    </div>
</div>
</body>
</html>
