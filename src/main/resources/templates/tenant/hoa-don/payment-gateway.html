<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Cổng thanh toán</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f2f5; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .gateway-card { max-width: 500px; width: 100%; }
        .gateway-header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
    </style>
</head>
<body>

<div class="gateway-card">
    <!-- Header giả lập cổng thanh toán -->
    <div class="card shadow-lg">
        <div class="card-header gateway-header text-center py-4">
            <h4 class="mb-1">
                <i class="bi bi-shield-lock me-2"></i>
                <span th:if="${phuongThuc == 'ONLINE'}">Cổng thanh toán Online</span>
            </h4>
            <small>Môi trường giả lập (Demo)</small>
        </div>
        <div class="card-body p-4">

            <!-- Thông tin giao dịch -->
            <div class="border rounded p-3 mb-4 bg-light">
                <div class="row mb-2">
                    <div class="col-5 text-muted">Mã đơn hàng:</div>
                    <div class="col-7 fw-bold" th:text="${maDon}"></div>
                </div>
                <div class="row mb-2">
                    <div class="col-5 text-muted">Phòng:</div>
                    <div class="col-7" th:text="${hoaDon.hopDong.phongTro.soPhong}"></div>
                </div>
                <div class="row mb-2">
                    <div class="col-5 text-muted">Kỳ thanh toán:</div>
                    <div class="col-7" th:text="${hoaDon.kyThanhToan}"></div>
                </div>
                <hr>
                <div class="row">
                    <div class="col-5 text-muted">Số tiền:</div>
                    <div class="col-7 fw-bold text-danger fs-5"
                         th:text="${#numbers.formatDecimal(hoaDon.conNo, 0, 'COMMA', 0, 'POINT')} + ' VND'"></div>
                </div>
            </div>

            <!-- Nút xác nhận / hủy -->
            <div class="d-grid gap-2">
                <!-- Thanh toán thành công -->
                <form th:action="@{/tenant/hoa-don/payment-callback/{id}(id=${hoaDon.hoaDonId})}" method="post">
                    <input type="hidden" name="ketQua" value="THANH_CONG">
                    <input type="hidden" name="phuongThuc" th:value="${phuongThuc}">
                    <button type="submit" class="btn btn-success btn-lg w-100">
                        <i class="bi bi-check-circle me-2"></i>Xác nhận thanh toán
                    </button>
                </form>

                <!-- Giả lập thất bại -->
                <form th:action="@{/tenant/hoa-don/payment-callback/{id}(id=${hoaDon.hoaDonId})}" method="post">
                    <input type="hidden" name="ketQua" value="THAT_BAI">
                    <input type="hidden" name="phuongThuc" th:value="${phuongThuc}">
                    <button type="submit" class="btn btn-outline-danger w-100">
                        <i class="bi bi-x-circle me-2"></i>Giả lập: Thanh toán thất bại
                    </button>
                </form>

                <!-- Hủy thanh toán -->
                <form th:action="@{/tenant/hoa-don/payment-callback/{id}(id=${hoaDon.hoaDonId})}" method="post">
                    <input type="hidden" name="ketQua" value="HUY">
                    <input type="hidden" name="phuongThuc" th:value="${phuongThuc}">
                    <button type="submit" class="btn btn-outline-secondary w-100">
                        <i class="bi bi-arrow-left me-2"></i>Hủy thanh toán
                    </button>
                </form>
            </div>
        </div>
        <div class="card-footer text-center text-muted small py-3">
            <i class="bi bi-lock me-1"></i>Giao dịch được bảo mật bởi hệ thống giả lập
        </div>
    </div>
</div>

</body>
</html>
