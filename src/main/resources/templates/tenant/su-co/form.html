<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><title>Báo cáo sự cố</title></head>
<body>
<div th:replace="~{layout/main :: layout(title='Báo cáo sự cố', content=~{::mainContent})}">
    <div th:fragment="mainContent">

        <!-- Flash messages -->
        <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
            <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
            <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show">
            <span th:text="${errorMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- Page Header -->
        <div class="mb-4">
            <h2><i class="bi bi-exclamation-triangle me-2"></i>Báo cáo sự cố</h2>
        </div>

        <!-- Room Info -->
        <div class="card mb-4">
            <div class="card-header bg-light">
                <h5 class="mb-0"><i class="bi bi-door-open me-2"></i>Thông tin phòng</h5>
            </div>
            <div class="card-body">
                <strong>Phòng:</strong>
                <span th:text="${hopDong.phongTro.soPhong}"></span>
                <span class="text-muted"> - </span>
                <span th:text="${hopDong.phongTro.khuTro.tenKhu}"></span>
            </div>
        </div>

        <!-- Form -->
        <div class="card">
            <div class="card-header bg-light">
                <h5 class="mb-0"><i class="bi bi-pencil-square me-2"></i>Thông tin sự cố</h5>
            </div>
            <div class="card-body">
                <form th:action="@{/tenant/su-co/create}" method="post" enctype="multipart/form-data">
                    <div class="mb-3">
                        <label for="loaiSuCo" class="form-label">Loại sự cố <span class="text-danger">*</span></label>
                        <select class="form-select" id="loaiSuCo" name="loaiSuCo" required>
                            <option value="">-- Chọn loại sự cố --</option>
                            <option value="Điện">Điện</option>
                            <option value="Nước">Nước</option>
                            <option value="Cửa/Khóa">Cửa/Khóa</option>
                            <option value="Mái/Trần">Mái/Trần</option>
                            <option value="Tường/Sàn">Tường/Sàn</option>
                            <option value="Thiết bị">Thiết bị</option>
                            <option value="Khác">Khác</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="moTa" class="form-label">Mô tả chi tiết <span class="text-danger">*</span></label>
                        <textarea class="form-control" id="moTa" name="moTa" rows="4" required
                                  placeholder="Mô tả chi tiết sự cố bạn gặp phải"></textarea>
                    </div>
                    <div class="mb-3">
                        <label for="mucDoUuTien" class="form-label">Mức độ ưu tiên <span class="text-danger">*</span></label>
                        <select class="form-select" id="mucDoUuTien" name="mucDoUuTien" required>
                            <option value="">-- Chọn mức độ --</option>
                            <option th:each="md : ${mucDoUuTiens}" th:value="${md.name()}"
                                    th:text="${md.name() == 'THAP' ? 'Thấp' : (md.name() == 'TRUNG_BINH' ? 'Trung bình' : 'Cao')}"></option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="hinhAnh" class="form-label">Hình ảnh đính kèm (nếu có)</label>
                        <input type="file" class="form-control" id="hinhAnh" name="fileImages" accept="image/*" multiple onchange="previewImages(event)">
                        <div id="imagePreviewContainer" class="d-flex flex-wrap gap-2 mt-3"></div>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-send me-1"></i>Gửi báo cáo
                        </button>
                        <a th:href="@{/tenant/su-co}" class="btn btn-secondary">
                            <i class="bi bi-x-circle me-1"></i>Hủy
                        </a>
                    </div>
                </form>
            </div>
        </div>

        <!-- Script for immediate image preview -->
        <script>
            function previewImages(event) {
                const previewContainer = document.getElementById('imagePreviewContainer');
                previewContainer.innerHTML = '';
                
                if (event.target.files) {
                    Array.from(event.target.files).forEach(file => {
                        const reader = new FileReader();
                        reader.onload = (e) => {
                            const img = document.createElement('img');
                            img.src = e.target.result;
                            img.className = 'img-thumbnail';
                            img.style.maxWidth = '150px';
                            img.style.maxHeight = '150px';
                            img.style.objectFit = 'cover';
                            previewContainer.appendChild(img);
                        };
                        reader.readAsDataURL(file);
                    });
                }
            }
        </script>
    </div>
</div>
</body>
</html>
